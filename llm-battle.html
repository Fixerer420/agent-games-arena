<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Battle Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); min-height: 100vh; }
        .llm-glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
        .typing { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="text-white p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-5xl font-bold text-center mb-2">🤖 LLM Battle Arena</h1>
        <p class="text-center text-purple-300 mb-8">Watch Large Language Models compete!</p>
        
        <!-- Model Selection -->
        <div class="bg-gray-800 rounded-xl p-6 mb-6 llm-glow">
            <h2 class="text-2xl font-bold mb-4">⚔️ Select LLM Combatants</h2>
            
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-purple-400 mb-2">🤖 LLM 1 (Left)</label>
                    <select id="llm1" class="w-full bg-gray-700 px-4 py-3 rounded-lg text-lg">
                        <option value="strategist">Strategist - Analyzes patterns</option>
                        <option value="randomizer">Randomizer - Pure chaos</option>
                        <option value="counter">Counter - Plays to beat last move</option>
                        <option value="psychologist">Psychologist - Mind reader</option>
                        <option value="aggressive">Aggressive - Always attacks</option>
                        <option value="defensive">Defensive - Plays it safe</option>
                        <option value="chaos">Chaos - Maximum unpredictability</option>
                    </select>
                    <p id="llm1Desc" class="text-sm text-gray-400 mt-2">Analyzes opponent patterns</p>
                </div>
                <div>
                    <label class="block text-pink-400 mb-2">🤖 LLM 2 (Right)</label>
                    <select id="llm2" class="w-full bg-gray-700 px-4 py-3 rounded-lg text-lg">
                        <option value="psychologist">Psychologist - Mind reader</option>
                        <option value="strategist">Strategist - Analyzes patterns</option>
                        <option value="randomizer">Randomizer - Pure chaos</option>
                        <option value="counter">Counter - Plays to beat last move</option>
                        <option value="aggressive">Aggressive - Always attacks</option>
                        <option value="defensive">Defensive - Plays it safe</option>
                        <option value="chaos">Chaos - Maximum unpredictability</option>
                    </select>
                    <p id="llm2Desc" class="text-sm text-gray-400 mt-2">Tries to read minds</p>
                </div>
            </div>
            
            <div class="flex gap-4">
                <button onclick="battleRound()" class="flex-1 bg-purple-600 hover:bg-purple-500 py-3 rounded-lg font-bold text-lg">
                    ⚔️ Fight!
                </button>
                <button onclick="startAutoBattle()" id="autoBtn" class="flex-1 bg-pink-600 hover:bg-pink-500 py-3 rounded-lg font-bold text-lg">
                    🔄 Auto Battle
                </button>
            </div>
        </div>
        
        <!-- Battle Arena -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-gray-800 rounded-xl p-6 text-center">
                <p id="move1Emoji" class="text-8xl mb-2">🤖</p>
                <p id="move1Name" class="text-xl font-bold text-purple-400">-</p>
                <p id="move1" class="text-4xl my-2">❓</p>
                <p id="reason1" class="text-xs text-gray-400 h-16 overflow-hidden"></p>
            </div>
            
            <div class="bg-gray-800 rounded-xl p-6 text-center flex flex-col justify-center">
                <p id="result" class="text-3xl font-bold mb-2">Ready?</p>
                <p id="score" class="text-xl text-gray-400">Score: 0 - 0</p>
            </div>
            
            <div class="bg-gray-800 rounded-xl p-6 text-center">
                <p id="move2Emoji" class="text-8xl mb-2">🤖</p>
                <p id="move2Name" class="text-xl font-bold text-pink-400">-</p>
                <p id="move2" class="text-4xl my-2">❓</p>
                <p id="reason2" class="text-xs text-gray-400 h-16 overflow-hidden"></p>
            </div>
        </div>
        
        <!-- Battle Log -->
        <div class="bg-gray-800 rounded-xl p-4">
            <h3 class="font-bold mb-2">📜 Battle Log</h3>
            <div id="log" class="h-48 overflow-y-auto text-sm space-y-1"></div>
        </div>
        
        <!-- Leaderboard -->
        <div class="mt-6 bg-gray-800 rounded-xl p-4">
            <h3 class="font-bold mb-2">🏆 LLM Rankings</h3>
            <div id="leaderboard" class="grid grid-cols-3 gap-4"></div>
        </div>
    </div>
    
    <script>
        const API = 'http://5.61.91.8:5000/api';
        const emojis = { 'rock': '🪨', 'paper': '📄', 'scissors': '✂️' };
        
        const llmNames = {
            'strategist': 'Strategist',
            'randomizer': 'Randomizer', 
            'counter': 'Counter',
            'psychologist': 'Psychologist',
            'aggressive': 'Aggressive',
            'defensive': 'Defensive',
            'chaos': 'Chaos'
        };
        
        let autoBattle = false;
        let scores = { llm1: 0, llm2: 0 };
        let battleCount = 0;
        
        // Update descriptions
        const descriptions = {
            'strategist': 'Analyzes patterns & predicts moves',
            'randomizer': 'Pure random - no pattern',
            'counter': 'Plays what beats your last move',
            'psychologist': 'Tries to read your mind',
            'aggressive': 'Attacks! Prefers scissors',
            'defensive': 'Plays it safe, prefers paper',
            'chaos': 'Maximum unpredictability'
        };
        
        document.getElementById('llm1').onchange = () => {
            document.getElementById('llm1Desc').textContent = descriptions[document.getElementById('llm1').value];
        };
        document.getElementById('llm2').onchange = () => {
            document.getElementById('llm2Desc').textContent = descriptions[document.getElementById('llm2').value];
        };
        
        async function battleRound() {
            const llm1 = document.getElementById('llm1').value;
            const llm2 = document.getElementById('llm2').value;
            
            // Show thinking
            document.getElementById('move1').textContent = '🤔';
            document.getElementById('move2').textContent = '🤔';
            document.getElementById('result').textContent = 'Thinking...';
            document.getElementById('result').className = 'text-xl font-bold mb-2 typing';
            
            try {
                const res = await fetch(`${API}/ai-battle/battle-live`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agent1: llm1,
                        agent2: llm2,
                        game_type: 'rps'
                    })
                });
                
                const data = await res.json();
                
                battleCount++;
                
                // Update display
                document.getElementById('move1Name').textContent = llmNames[llm1];
                document.getElementById('move2Name').textContent = llmNames[llm2];
                document.getElementById('move1').textContent = emojis[data.move1] || '❓';
                document.getElementById('move2').textContent = emojis[data.move2] || '❓';
                document.getElementById('reason1').textContent = data.reasoning1 || '';
                document.getElementById('reason2').textContent = data.reasoning2 || '';
                
                // Score
                if (data.winner === 'agent1') {
                    scores.llm1++;
                    document.getElementById('result').textContent = '🎉 Left Wins!';
                    document.getElementById('result').className = 'text-3xl font-bold mb-2 text-green-400';
                } else if (data.winner === 'agent2') {
                    scores.llm2++;
                    document.getElementById('result').textContent = '🎉 Right Wins!';
                    document.getElementById('result').className = 'text-3xl font-bold mb-2 text-pink-400';
                } else {
                    document.getElementById('result').textContent = '🤝 Draw!';
                    document.getElementById('result').className = 'text-3xl font-bold mb-2 text-yellow-400';
                }
                
                document.getElementById('score').textContent = 
                    `Score: ${scores.llm1} - ${scores.llm2}`;
                
                // Log
                const log = document.getElementById('log');
                const entry = document.createElement('div');
                entry.className = 'bg-gray-700 p-2 rounded flex justify-between';
                entry.innerHTML = `
                    <span>${battleCount}. ${emojis[data.move1]} vs ${emojis[data.move2]}</span>
                    <span class="${data.winner === 'agent1' ? 'text-green-400' : data.winner === 'agent2' ? 'text-pink-400' : 'text-yellow-400'}">
                        ${data.winner === 'agent1' ? 'Left' : data.winner === 'agent2' ? 'Right' : 'Draw'}
                    </span>
                `;
                log.insertBefore(entry, log.firstChild);
                
            } catch(e) {
                document.getElementById('result').textContent = 'Error: ' + e;
            }
        }
        
        function startAutoBattle() {
            autoBattle = !autoBattle;
            document.getElementById('autoBtn').textContent = autoBattle ? '⏹️ Stop' : '🔄 Auto Battle';
            
            if (autoBattle) {
                battleRound();
                setInterval(() => {
                    if (autoBattle) battleRound();
                }, 5000);
            }
        }
        
        // Initial
        battleRound();
    </script>
</body>
</html>
